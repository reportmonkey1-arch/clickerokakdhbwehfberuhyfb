<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TapForge League</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <span class="eyebrow">Telegram Clicker</span>
          <h1>TapForge League</h1>
        </div>
        <button id="syncButton" class="ghost" type="button">Sync</button>
      </header>

      <section class="stats">
        <article>
          <span>Монеты</span>
          <strong id="coins">0</strong>
        </article>
        <article>
          <span>Сила</span>
          <strong id="power">1</strong>
        </article>
        <article>
          <span>Лига</span>
          <strong id="league">Bronze</strong>
        </article>
      </section>

      <section class="forge">
        <button id="tapButton" class="tap" type="button" aria-label="Кликнуть">
          <span class="core"></span>
          <span class="shine"></span>
        </button>
        <p id="status">Тапай, прокачивай силу и забирай место в лидерборде.</p>
      </section>

      <section class="actions">
        <button id="upgradeButton" type="button">Улучшить: <span id="upgradeCost">25</span></button>
        <button id="boostButton" type="button">Буст x2: <span id="boostCost">120</span></button>
      </section>

      <section class="leaderboard">
        <div class="section-title">
          <h2>Лидерборд</h2>
          <span id="playerName">Guest</span>
        </div>
        <ol id="leaderboard"></ol>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
